name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Only cancel superseded PR runs. For pushes to main, github.ref is refs/heads/main and
  # all pushes share the same concurrency group — cancel-in-progress would cancel CI for
  # an already-merged commit, leaving branch protection's "passing CI" record stale.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  quality-gates:
    name: py${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5  # pin: 11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@v8.1.0  # pin: 08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Sync dev dependencies (frozen)
        run: uv sync --frozen --group dev

      - name: Lint (ruff check)
        run: uv run ruff check src/ tests/

      - name: Format check (ruff format)
        # ruff format handles .py/.pyi only; passing pyproject.toml was a silent no-op.
        run: uv run ruff format --check src/ tests/

      - name: Type check (mypy --strict)
        run: uv run mypy --strict src/

      - name: Migration registry lint (Story 1.19 AC1.7 ADR-022)
        run: uv run python scripts/check_migration_registry.py

      - name: Dashboard DD-09 gate (Story 5.2 AC3)
        run: uv run python scripts/check_dashboard_no_data_theme.py

      - name: wireformat-immutability check (Story 1.21 / Decision F3)
        # Run in every matrix cell — pydantic JSON-Schema bytes can drift across
        # Python micro-versions or OS, and a per-cell failure with no script output
        # is harder to diagnose than a uniform script failure. <1s per cell.
        run: uv run python scripts/freeze_wireformat_snapshots.py

      - name: Unit + integration tests (pytest with coverage gate)
        run: uv run pytest

      - name: Upload coverage XML (for downstream tooling)
        if: always()  # upload even if pytest failed, so reviewers can inspect
        # Non-fatal: this is a downstream-tooling convenience upload, NOT a quality
        # gate. A transient GitHub ArtifactService/CreateArtifact timeout must not red
        # the cell after the real gate (pytest + coverage) already passed (Story 4.9
        # close-out: run 27896004282 py3.12-macos flaked here while tests were green).
        continue-on-error: true
        uses: actions/upload-artifact@v4  # pin: ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14
          if-no-files-found: ignore  # coverage.xml may not exist on early failure

  frontend-gates:
    name: Dashboard stylelint gate (Story 5.2 AC2)
    needs: quality-gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5  # pin: 11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@v4  # pin: 49933ea5288caeca8642d1e84afbd0f4d342db7
        with:
          node-version: "22"

      - name: stylelint — component CSS must use design tokens
        run: |
          npx --yes stylelint@16.18.0 "src/sdlc/dashboard/static/styles/**/*.css" \
            --config src/sdlc/dashboard/static/styles/.stylelintrc.json \
            --allow-empty-input

  chaos-tests:
    name: Chaos tests (kill points) — ubuntu-latest only
    needs: quality-gates  # don't burn 15min runner time if lint/type/unit gate fails
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5  # pin: 11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@v8.1.0  # pin: 08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Sync dev dependencies (frozen)
        run: uv sync --frozen --group dev

      - name: Chaos tests (10 kill points × 100 seeds)
        run: uv run pytest -m chaos --no-cov -q

  benchmarks:
    name: Performance Benchmarks (Story 1.15)
    needs: quality-gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5  # pin: 11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@v8.1.0  # pin: 08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Sync dev dependencies (frozen)
        run: uv sync --frozen --group dev

      - name: Run benchmarks (NFR-PERF-1 gate)
        run: uv run pytest -m benchmark --benchmark-only --no-cov -v

  mutation-tests:
    name: Adopt mutation testing (Story 3.7 AC2)
    needs: quality-gates
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5  # pin: 11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@v8.1.0  # pin: 08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Sync dev dependencies (frozen)
        run: uv sync --frozen --group dev

      - name: Adopt mutation gate (>=95% kill)
        run: uv run python scripts/run_adopt_mutation.py

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4  # pin: ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: mutmut-adopt-${{ github.run_id }}
          path: mutants/mutmut-cicd-stats.json
          retention-days: 14
          if-no-files-found: ignore

  posix-adopt-ran:
    # Epic 3 retro action A2: prove the POSIX-only adopt suite ACTUALLY RAN on a
    # POSIX runner — an all-skipped run is a false green (ADR-034: adopt skips on
    # win32). Cheap (~1s) but is a distinct, require-able status check so a future
    # win32 cell or a broadened skip marker can't silently land a green merge.
    name: POSIX adopt suite actually-ran gate (Epic 3 retro A2)
    needs: quality-gates
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5  # pin: 11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@v8.1.0  # pin: 08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Sync dev dependencies (frozen)
        run: uv sync --frozen --group dev

      - name: Assert POSIX adopt suite ran (not all-skipped)
        run: uv run python scripts/check_posix_suite_ran.py --min-executed 50

  parity-perf:
    name: Hook Parity Latency Gate (Story 2A.6 AC7)
    needs: quality-gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5  # pin: 11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@v8.1.0  # pin: 08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Sync dev dependencies (frozen)
        run: uv sync --frozen --group dev

      - name: Run parity latency benchmarks (p95 ≤ 500ms gate)
        run: uv run pytest -m parity_perf --benchmark-only --no-cov -v

  debt-decay-gate:
    name: Debt-Decay Budget Gate (CONTRIBUTING §7.5)
    # Runs on every PR. Mode is "warn" by default (advisory output, exit 0)
    # unless the PR carries a `before-story-<N>.1` label — then strict
    # (exit 1 on budget violation), gating the Story N.1 worktree opening.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v5  # pin: 11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@v8.1.0  # pin: 08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Sync dev dependencies (frozen)
        run: uv sync --frozen --group dev

      - name: Audit debt-decay budget
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        run: |
          # Extract a `before-story-<target>.1` label if present.
          label=$(printf '%s' "$PR_LABELS" \
            | grep -oE 'before-story-[0-9]+[a-z]?\.1' \
            | head -1 || true)
          if [ -n "$label" ]; then
            target=$(printf '%s' "$label" \
              | sed -E 's/before-story-([0-9]+[a-z]?)\.1/\1/')
            mode=strict
            echo "::notice::Story N.1 gate active — target epic=$target, mode=strict"
          else
            target=5   # current next-epic prep target (Epic 5); update per epic
            mode=warn
            echo "::notice::Advisory debt audit — target epic=$target, mode=warn"
          fi
          uv run python scripts/check_debt_decay_budget.py \
            --target-epic "$target" \
            --mode "$mode"

  ci-gate:
    # Epic 4 retro A1 — "CI-never-started ≠ green". The single status check
    # branch protection should require. It runs even when upstream jobs fail,
    # skip, or never start (`if: always()`), then asserts each required job
    # concluded `success`. A run that dies at "Set up job" — e.g. a bad action
    # ref like the 2026-06-09 phantom `setup-uv@v8` tag, which made every cell
    # fail in ~10s before reaching the test step — lands here as a RED gate,
    # never as a vacuous green or a perpetually-pending required check. See
    # _bmad-output/implementation-artifacts/ci-never-green-finding-2026-06-09.md.
    name: CI gate (all required jobs green)
    if: always()
    needs:
      - quality-gates
      - frontend-gates
      - chaos-tests
      - benchmarks
      - mutation-tests
      - posix-adopt-ran
      - parity-perf
      - debt-decay-gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Assert every required job succeeded
        env:
          R_QUALITY: ${{ needs.quality-gates.result }}
          R_FRONTEND: ${{ needs.frontend-gates.result }}
          R_CHAOS: ${{ needs.chaos-tests.result }}
          R_BENCH: ${{ needs.benchmarks.result }}
          R_MUTATION: ${{ needs.mutation-tests.result }}
          R_POSIX: ${{ needs.posix-adopt-ran.result }}
          R_PARITY: ${{ needs.parity-perf.result }}
          R_DEBT: ${{ needs.debt-decay-gate.result }}
        run: |
          echo "quality-gates=$R_QUALITY frontend-gates=$R_FRONTEND chaos-tests=$R_CHAOS benchmarks=$R_BENCH \
            mutation-tests=$R_MUTATION posix-adopt-ran=$R_POSIX parity-perf=$R_PARITY \
            debt-decay-gate=$R_DEBT"
          fail=0
          # These jobs run on every push and PR — each MUST be `success`. A
          # `skipped`/empty result here means the job never started (e.g. a
          # setup-time abort) and is treated as RED, NOT a pass.
          for pair in \
            "quality-gates:$R_QUALITY" \
            "frontend-gates:$R_FRONTEND" \
            "chaos-tests:$R_CHAOS" \
            "benchmarks:$R_BENCH" \
            "mutation-tests:$R_MUTATION" \
            "posix-adopt-ran:$R_POSIX" \
            "parity-perf:$R_PARITY"; do
            name="${pair%%:*}"; res="${pair##*:}"
            if [ "$res" != "success" ]; then
              echo "::error::required job '$name' concluded '$res' (must be 'success')"
              fail=1
            fi
          done
          # debt-decay-gate runs on PRs only (if: pull_request); on push it is
          # legitimately skipped. Any other non-success result is RED.
          if [ "$R_DEBT" != "success" ] && [ "$R_DEBT" != "skipped" ]; then
            echo "::error::debt-decay-gate concluded '$R_DEBT' (must be 'success' or 'skipped')"
            fail=1
          fi
          if [ "$fail" -ne 0 ]; then
            echo "::error::CI gate RED — not all required jobs succeeded. A run that aborts at 'Set up job' or never starts lands here, never as a false green (Epic 4 retro A1)."
            exit 1
          fi
          echo "CI gate GREEN — all required jobs succeeded (debt-decay-gate success or push-skipped)."
