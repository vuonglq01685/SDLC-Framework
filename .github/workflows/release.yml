name: release

on:
  push:
    tags:
      - "v*.*.*"   # semver tag triggers the publish pipeline; no other event publishes

permissions:
  contents: read   # default; overridden per-job below

jobs:
  qa:
    name: full quality gates (pre-publish)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5  # pin: 11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: astral-sh/setup-uv@v8.1.0  # pin: 08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock
      - run: uv sync --frozen --group dev
      - run: uv run ruff check src/ tests/
      # ruff format handles .py/.pyi only; pyproject.toml argument was a silent no-op.
      - run: uv run ruff format --check src/ tests/
      - run: uv run mypy --strict src/
      - run: uv run pytest

  build:
    name: build wheel
    needs: qa
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5  # pin: 11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          # Full history is required for the `git merge-base --is-ancestor` check below;
          # default fetch-depth=1 only retrieves the tagged commit, leaving origin/main
          # unavailable as a comparison base.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.1.0  # pin: 08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock
      - run: uv sync --frozen --group dev

      - name: Assert tag is reachable from origin/main
        # `push.tags: v*.*.*` fires regardless of which branch the tagged commit lives on.
        # Without this gate, a tag pointing to a feature-branch commit (or a personal commit
        # never reviewed) would publish unverified code that bypassed the 8-cell PR matrix.
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag $GITHUB_REF_NAME points to $GITHUB_SHA, which is not reachable from origin/main. Refusing to publish unverified code."
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME at $GITHUB_SHA is on origin/main; OK to proceed."

      - name: Assert pyproject.toml version matches the tag
        # tomllib (Python 3.11+, available via the setup-uv 3.12 install) replaces the prior
        # grep+cut approach. Survives single-quoted versions, comments after the value, and
        # cleanly errors on the future migration to dynamic = ["version"] (foreshadowed by ADR-008).
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pyproject_version=$(uv run python -c "
          import tomllib
          print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])
          ")
          echo "tag=$tag_version  pyproject=$pyproject_version"
          if [ "$tag_version" != "$pyproject_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject.toml version $pyproject_version"
            exit 1
          fi

      - name: Pre-flight — refuse to re-publish an existing PyPI version
        # Force-pushed or accidentally-double-pushed tags would otherwise build a wheel and
        # fail opaquely deep in the publish step (PyPI 400). Catch it here with a clear signal.
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          status=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/sdlc-framework/$tag_version/json")
          case "$status" in
            200) echo "::error::Version $tag_version is already published to PyPI; refusing to re-publish."; exit 1 ;;
            404) echo "::notice::Version $tag_version is not yet on PyPI; OK to proceed." ;;
            *)   echo "::warning::Unexpected status $status from PyPI for sdlc-framework/$tag_version; proceeding (network glitch?)." ;;
          esac

      - name: Build wheel only
        run: uv build --wheel

      - name: Upload built wheel
        uses: actions/upload-artifact@v4  # pin: ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist
          path: dist/*.whl
          retention-days: 7
          if-no-files-found: error

  publish:
    name: publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15  # fail fast if PyPI handshake or environment-protection wait stalls
    environment: pypi   # GitHub Environment named "pypi" — pre-registered as PyPI Trusted Publisher
    permissions:
      id-token: write    # MANDATORY for OIDC trusted publishing
      contents: read
    steps:
      - name: Download built wheel
        uses: actions/download-artifact@v4  # pin: d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist
          path: dist

      - name: Publish package distributions to PyPI
        # SHA-pinned per ADR-008's deliberate exception to ADR-006's doc-only convention:
        # this single action holds the OIDC keys to PyPI and is the highest-value supply-
        # chain target in the repo, warranting a literal pin (not just a comment).
        # OIDC trusted publishing — no `with: password:` (replaced by id-token).
        # TestPyPI staged-verification recipe lives in ADR-008 "Operator setup".
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
