# Debt-Decay Budget — machine-readable counterpart of deferred-work.md
#
# Source of truth for scripts/check_debt_decay_budget.py (CONTRIBUTING §7.5).
# Each item names a technical-debt ticket the team has explicitly tracked
# in a retrospective. Process improvements (A-series) and documentation
# actions (DOC-series) are NOT tracked here — only D-series debt.
#
# Severity classification (from Epic 2A retrospective top-of-mind worries):
#   BLOCKING — must close before Story N.1 of the next epic
#   HIGH     — should close before Story N.1; ≥50% threshold (Gate B)
#   MED      — track and close opportunistically
#   LOW      — nice-to-have
#
# Status:
#   open    — no PR-merged closure recorded
#   closed  — closure evidenced in retro §4 follow-through table or
#             in the cited story's Change Log
#
# Schema enforced by scripts/check_debt_decay_budget.py::load_budget.
# Updated by the owner of each prep-sprint critical-path item (C1–C8)
# when a closure lands; CI gate re-evaluates on every PR touching this
# file or any deferred-work.md update.

