# Team overrides for bmad-code-review (merged after skill defaults).
# See: _bmad/scripts/resolve_customization.py — persistent_facts append.

[workflow]

persistent_facts = [
  "Review context: follow CLAUDE.md graphify rules. Do NOT read graphify-out/GRAPH_REPORT.md upfront. For codebase questions and cross-file impact, call graphify-knowledge-graph MCP tools before reading sources or grep/glob: query_graph(\"<concept>\"), get_node(\"<filename>\"), get_neighbors(\"<filename>\"), shortest_path(\"<A>\", \"<B>\"). For cross-module \"how does X relate to Y\", use query_graph or shortest_path — do not grep. If graphify-out/wiki/index.md exists, use it for high-level orientation only.",
]

activation_steps_prepend = [
  "If graphify-out/ is missing or the graph is likely stale vs the tree you are reviewing, run `graphify update .` once so MCP graphify-knowledge-graph matches the repo (see CLAUDE.md).",
]
