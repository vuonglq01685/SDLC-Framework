[project]
name = "sdlc-framework"
version = "0.0.0"
description = "Deterministic, auditable, multi-agent SDLC orchestration framework on top of Claude Code."
readme = "README.md"
license = { text = "TBD" }
authors = [
    { name = "Vuonglq01685" }
]
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2,<3",   # cap: pydantic 2→3 will introduce schema breaks (v3 is on the roadmap)
    "pyyaml>=6,<7",     # cap: pyyaml 6→7 has not been released; defensive guard against future major
    "typer>=0.15,<0.26",  # floor: 0.15+ is when --version eager-callback semantics stabilised; cap matches lockfile (0.25.x)
    "rich>=13,<15",  # cap: rich 14→15 defensive guard. Direct dep added in Story 1.17 per cli/output.py rich console (AC5.6).
    "tomli>=2.0.1; python_version < '3.11'",  # tomllib backport — stdlib tomllib is 3.11+ (PEP 680); requires-python floor is 3.10 (config/hooks.py, cli/status.py).
]

[project.scripts]
sdlc = "sdlc.cli.main:app"

[dependency-groups]
dev = [
    "ruff>=0.6.0",
    "mypy>=1.11.0,<3",          # cap: mypy 1→2 introduced inference breaks; lock guards 2.x
    "pytest>=8.0.0,<10",        # cap: pytest 8→9 has --strict-config / filterwarnings shifts
    "pytest-cov>=5.0.0",
    "coverage[toml]>=7.6.0",
    "pre-commit>=4.0.0,<5",
    "mkdocs>=1.6.0,<2",
    "hypothesis>=6.100,<7",
    "pytest-benchmark>=5.0.0,<6",  # floor: 4.x had pedantic(rounds=1) regressions; cap: 6.x may shift pedantic API (Story 1.15 perf gate)
    "pytest-asyncio>=0.23",     # async test support for hooks/runner async surface (Story 2A.4)
    "types-PyYAML",             # mypy stubs for pyyaml (dev-only; not shipped at runtime)
    "mkdocs-mermaid2-plugin>=1.2.3",
    "mutmut>=3.0.0,<4",
    "playwright>=1.49,<2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sdlc"]
# EPIC-3 prep P5: the content trees below ship via force-include (ADR-005).
# Newer hatchling raises ValueError on duplicate archive paths when the standard
# `packages` selection ALSO picks up a force-included file (every file under each
# tree collides — first observed at agents/.gitkeep, then agents/index.yaml).
# `exclude` applies only to the standard selection; force-include is immune — so
# each content tree ships exactly once, from force-include alone. The importable
# .py under hooks/claude_hooks/workflows/workflows_yaml ships via force-include at
# the same archive path, so imports are unaffected.
exclude = [
    "src/sdlc/agents/**",
    "src/sdlc/claude_hooks/**",
    "src/sdlc/commands/**",
    "src/sdlc/hooks/**",
    "src/sdlc/workflows/**",
    "src/sdlc/workflows_yaml/**",
    "src/sdlc/skills/**",
    "src/sdlc/memory/**",
    "src/sdlc/dashboard/static/**",
]
# ADR-005: force-include the content trees under src/sdlc/ that ship as
# package_data. Each tree is created as content lands in later stories
# (agents → Story 2A.2; commands → Story 2A.6/2A.8+; workflows → Story 2A.1;
# hooks → Story 2A.4-2A.6; skills/memory/dashboard → Stories 2A/5/x).
# Empty trees are NOT pre-created; force-include is a no-op when the source
# path is missing (verified: hatch silently skips missing force-include sources).
# Story 1.16's `sdlc init` is the consumer — it copies whatever exists from
# these trees into `.claude/` at init time.

[tool.hatch.build.targets.wheel.force-include]
"src/sdlc/agents" = "sdlc/agents"
"src/sdlc/claude_hooks" = "sdlc/claude_hooks"
"src/sdlc/commands" = "sdlc/commands"
"src/sdlc/hooks" = "sdlc/hooks"
"src/sdlc/workflows" = "sdlc/workflows"
"src/sdlc/workflows_yaml" = "sdlc/workflows_yaml"
"src/sdlc/skills" = "sdlc/skills"
"src/sdlc/memory" = "sdlc/memory"
# Story 5.2: ship runtime CSS only; .stylelintrc.json is CI-only (D1).
"src/sdlc/dashboard/static/.gitkeep" = "sdlc/dashboard/static/.gitkeep"
"src/sdlc/dashboard/static/index.html" = "sdlc/dashboard/static/index.html"
