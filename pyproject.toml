[project]
name = "sdlc-framework"
version = "0.0.0"
description = "Deterministic, auditable, multi-agent SDLC orchestration framework on top of Claude Code."
readme = "README.md"
license = { text = "TBD" }
authors = [
    { name = "Vuonglq01685" }
]
requires-python = ">=3.10"
dependencies = []

# [project.scripts]
# sdlc = "sdlc.cli.main:app"
# TODO: Wire CLI entry point in Story 1.16. Entry point omitted to avoid shipping a broken script.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sdlc"]
# TODO: ADR-005 — package_data extension lands in Story 1.16+
# Future additions: agents/, commands/, skills/, dashboard/static/, workflows/, memory/, claude_hooks/

# NOTE: sdist suppression (wheel-only per PRD §499) is a v1 release-pipeline concern.
# Story 1.3 release.yml will add: [tool.hatch.build.targets.sdist] exclude = ["**"]
