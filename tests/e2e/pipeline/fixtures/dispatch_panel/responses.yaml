#         from sdlc.specialists import load_registry; from pathlib import Path; \
#         import tempfile; \
#         spec = WorkflowRegistry.load(_workflows_package_dir()).get("/sdlc-start"); \
#         registry = load_registry(Path("tests/e2e/pipeline/fixtures/dispatch_panel/specialists")); \
#         fm = {"schema_version":1,"kind":"product_brief","idea":"Build a Stripe webhook integration", \
#               "drafted_at":"2026-05-11T00:00:00.000Z", \
#               "drafted_by_specialists":[spec.primary_agent,*spec.parallel_agents,spec.synthesizer_agent]}; \
#         td = tempfile.mkdtemp(); _materialize_phase1_mock_fixtures(Path(td), spec=spec, registry=registry, \
#             idea_text="Build a Stripe webhook integration", extra_context=fm); \
#         print(Path(td,f"{spec.name}.yaml").read_text())'
#
