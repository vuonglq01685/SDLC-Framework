  expected_error_code: null
  claude_only: false
  engine_skip: false
  path_is_absolute_under_cwd: true
  repo_setup_steps: []

- name: path_absolute_outside_repo_write
  # F21: Intentionally claude-only. The engine-side hook chain runs INSIDE the repo
  # (dispatcher only writes via _validate_target_path which already rejects out-of-repo
  # paths via DispatchError BEFORE the hook chain — see _panel_helpers._validate_target_path).
  # Claude-side defends-in-depth against tool_input.file_path traversal payloads;
  # there is no symmetric engine-side surface to test parity against.
  tool_name: Write
  target_path: "evil-file.txt"
  expected_decision: deny
  expected_error_code: path_outside_repo
  claude_only: true
  engine_skip: true
  path_is_absolute_outside_repo: true
  repo_setup_steps: []

