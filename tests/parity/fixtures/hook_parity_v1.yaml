# hook_parity_v1.yaml — AC5 parity fixture (Story 2A.6)
#
# Each row: {name, tool_name, target_path, expected_decision, expected_error_code,
#            claude_only, engine_skip, path_is_absolute_under_cwd,
#            path_is_absolute_outside_repo, repo_setup_steps}
#
# expected_decision: allow | deny
# expected_error_code: null | naming_violation | phase_gate_violation | path_outside_repo
# claude_only: true  → only test Claude-side (no engine-side equivalent)
# engine_skip: true  → skip engine-side (fast-path tool name; Claude side always approve)
# path_is_absolute_under_cwd: true → target_path is joined to tmp_path at test time
# path_is_absolute_outside_repo: true → target_path is resolved outside tmp_path at test time
#
# repo_setup_steps:
#   - kind: create_signoff
#     phase: 1        # creates .claude/state/signoffs/phase-1.yaml
#     approved: true  # bool

